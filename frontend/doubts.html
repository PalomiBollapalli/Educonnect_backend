<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doubts | EduConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-success-custom shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold" href="dashboard.html">EduConnect Doubts</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="notes.html">Notes</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-5">
  <div class="glass-card p-4 page-card mb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
      <div>
        <h2 class="page-title mb-2">Ask a Doubt</h2>
        <p class="text-muted mb-0">Post your academic question and invite classmates to clarify the answer.</p>
      </div>
      <span class="badge badge-custom rounded-pill py-2 px-3">Real-time help</span>
    </div>
    <div id="alertContainer" class="alert-container"></div>
    <form id="doubtForm">
      <div class="row g-3">
        <div class="col-12">
          <div class="mb-3">
            <label for="title" class="form-label">Question Title</label>
            <input type="text" id="title" class="form-control" placeholder="Short summary" required>
          </div>
        </div>
        <div class="col-12">
          <div class="mb-3">
            <label for="question" class="form-label">Question Details</label>
            <textarea id="question" class="form-control" rows="4" placeholder="Describe your doubt in detail" required></textarea>
          </div>
        </div>
      </div>
      <button class="btn btn-success">Post Doubt</button>
    </form>
  </div>
  <div id="doubtContainer"></div>
</div>
<script src="doubts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
