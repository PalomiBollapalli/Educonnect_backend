<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | EduConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-auth">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="glass-card p-4 register-card shadow-sm">
      <div class="text-center mb-4">
        <h2 class="fw-bold">Create Your Account</h2>
        <p class="text-muted">Join EduConnect to share notes, ask doubts, and collaborate with classmates.</p>
      </div>
      <div id="alertContainer" class="alert-container"></div>
      <form id="registerForm">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="Your email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Choose a secure password" required>
        </div>
        <button class="btn btn-success w-100">Register</button>
      </form>
      <p class="mt-4 text-center text-muted">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>
  <script src="register.js"></script>
</body>
</html>
