<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EduConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-auth">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="glass-card p-4 login-card shadow-sm">
      <div class="text-center mb-4">
        <h2 class="fw-bold">Welcome Back</h2>
        <p class="text-muted">Login to continue sharing notes, solving doubts, and connecting with classmates.</p>
      </div>
      <div id="alertContainer" class="alert-container"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <p class="mt-4 text-center text-muted">New user? <a href="register.html">Create an account</a></p>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
